<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sagar Kumar - AI & Mobile Engineer</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700;9..144,900&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0C0C10;
  --surface: #131318;
  --surface2: #1A1A22;
  --border: rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.11);
  --accent: #7B6FF0;
  --accent2: #A09CF8;
  --green: #2DD4A0;
  --amber: #F5A623;
  --text: #DDDDE8;
  --muted: #6B6B80;
  --soft: #9A9AB0;
  --white: #FFFFFF;
}

*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* top accent bar */
body::before {
  content: '';
  position: fixed; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent 0%, var(--accent) 40%, var(--accent2) 60%, transparent 100%);
  z-index: 100; opacity: 0.6;
}

.wrap { max-width: 820px; margin: 0 auto; padding: 0 32px 120px; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── HERO ── */
.hero {
  padding: 80px 0 56px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 64px;
  animation: fadeUp .6s ease both;
}

.hero-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 32px; flex-wrap: nowrap; }

.status-tag {
  display: inline-flex; align-items: center; gap: 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: .14em; text-transform: uppercase;
  color: var(--green);
  background: rgba(45,212,160,.06);
  border: 1px solid rgba(45,212,160,.18);
  padding: 5px 12px; border-radius: 3px; margin-bottom: 24px;
}
.status-dot {
  width: 5px; height: 5px; background: var(--green);
  border-radius: 50%; animation: blink 2.5s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

.name {
  font-family: 'Fraunces', serif;
  font-size: clamp(42px, 6.5vw, 68px);
  font-weight: 900; line-height: .92;
  letter-spacing: -.025em; color: var(--white);
  margin-bottom: 6px;
}
.name-accent { color: var(--accent2); }

.tagline {
  font-size: 15px; font-weight: 400;
  color: var(--soft); max-width: 480px;
  line-height: 1.75; margin-top: 16px;
}
.tagline b { color: var(--text); font-weight: 500; }

.chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 20px; }
.chip {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; padding: 4px 10px;
  border-radius: 3px;
  border: 1px solid var(--border2);
  color: var(--muted); background: var(--surface);
  letter-spacing: .03em;
  transition: border-color .18s, color .18s;
  cursor: default;
}
.chip:hover { border-color: var(--accent); color: var(--accent2); }

/* award badge */
.badges { flex-shrink: 0; }
.badge-star {
  background: rgba(245,166,35,.05);
  border: 1px solid rgba(245,166,35,.18);
  border-radius: 10px; padding: 16px 20px;
  text-align: center; min-width: 116px;
}
.badge-star .b-icon { font-size: 24px; display: block; margin-bottom: 6px; }
.badge-star .b-lbl {
  font-family: 'Fraunces', serif;
  font-size: 15px; font-weight: 700;
  color: var(--amber); display: block; margin-bottom: 2px;
}
.badge-star .b-sub {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; color: var(--muted); letter-spacing: .08em;
}

/* ── SECTION ── */
.sec { margin-bottom: 60px; animation: fadeUp .6s ease both; }
.sec:nth-child(2){animation-delay:.06s} .sec:nth-child(3){animation-delay:.12s}
.sec:nth-child(4){animation-delay:.18s} .sec:nth-child(5){animation-delay:.24s}
.sec:nth-child(6){animation-delay:.30s} .sec:nth-child(7){animation-delay:.36s}

.sec-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; letter-spacing: .24em;
  text-transform: uppercase; color: var(--muted);
  margin-bottom: 22px;
  display: flex; align-items: center; gap: 12px;
}
.sec-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* ── KAILY ── */
.kaily-wrap {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 14px; overflow: hidden;
  margin-bottom: 12px;
}
.kaily-top-bar {
  height: 2px;
  background: linear-gradient(90deg, var(--accent) 0%, var(--accent2) 50%, #C084FC 100%);
}
.kaily-body { padding: 28px 28px 24px; }
.kaily-meta {
  display: flex; align-items: center; gap: 8px; margin-bottom: 12px;
}
.kaily-live-dot { width: 5px; height: 5px; background: var(--green); border-radius: 50%; animation: blink 2s infinite; }
.kaily-live-lbl {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; color: var(--green); letter-spacing: .12em; text-transform: uppercase;
}
.kaily-title {
  font-family: 'Fraunces', serif;
  font-size: 22px; font-weight: 700; color: var(--white); margin-bottom: 4px;
}
.kaily-sub { font-size: 12px; color: var(--muted); letter-spacing: .04em; margin-bottom: 14px; }
.kaily-desc { font-size: 13.5px; line-height: 1.8; color: var(--soft); max-width: 560px; }

.kstat-row { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
.kstat {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 16px;
}
.kstat .kn {
  font-family: 'Fraunces', serif;
  font-size: 20px; font-weight: 700; color: var(--accent2);
  display: block; line-height: 1;
}
.kstat .kl { font-size: 9.5px; color: var(--muted); letter-spacing: .05em; margin-top: 2px; display: block; }

.feat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
@media(max-width:540px){ .feat-grid { grid-template-columns: 1fr; } }
.feat {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 13px 15px;
  display: flex; gap: 11px; align-items: flex-start;
  transition: border-color .18s, background .18s;
}
.feat:hover { border-color: var(--border2); background: var(--surface2); }
.feat-ico { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
.feat .ft { font-size: 12.5px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
.feat .fd { font-size: 11.5px; color: var(--muted); line-height: 1.5; }

/* ── TIMELINE ── */
.timeline { display: flex; flex-direction: column; }
.titem { display: grid; grid-template-columns: 14px 1fr; gap: 0 20px; padding-bottom: 32px; }
.titem:last-child { padding-bottom: 0; }
.titem:last-child .tline { display: none; }
.tcol { display: flex; flex-direction: column; align-items: center; padding-top: 4px; }
.tdot {
  width: 9px; height: 9px; border-radius: 50%;
  border: 1.5px solid var(--accent); background: var(--bg);
  flex-shrink: 0; z-index: 1;
}
.tdot.now { background: var(--accent); box-shadow: 0 0 8px rgba(123,111,240,.5); }
.tline { flex: 1; width: 1px; background: var(--border); margin-top: 5px; }

.tcomp { font-family: 'Fraunces', serif; font-size: 17px; font-weight: 700; color: var(--white); margin-bottom: 1px; }
.trole { font-size: 13px; font-weight: 500; color: var(--accent2); margin-bottom: 3px; }
.tdate { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--muted); letter-spacing: .06em; margin-bottom: 12px; }
.tbullets { display: flex; flex-direction: column; gap: 6px; }
.tb { font-size: 13px; line-height: 1.7; color: var(--soft); padding-left: 13px; position: relative; }
.tb::before { content: '-'; position: absolute; left: 0; color: var(--accent); font-weight: 600; }
.tb b { color: var(--text); font-weight: 500; }

/* ── SKILL MAP ── */
.smap-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
@media(max-width:540px){ .smap-grid { grid-template-columns: 1fr; } }
.scard {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 16px 18px;
  transition: border-color .18s, transform .2s;
}
.scard:hover { border-color: var(--border2); transform: translateY(-2px); }
.scard-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.scard-ico {
  width: 30px; height: 30px; border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; flex-shrink: 0;
}
.scard-title { font-size: 13px; font-weight: 600; color: var(--white); }
.stags { display: flex; flex-wrap: wrap; gap: 5px; }
.stag {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  padding: 3px 8px; border-radius: 3px;
  border: 1px solid var(--border); color: var(--muted);
  background: var(--surface2);
  transition: border-color .15s, color .15s;
}
.stag:hover { border-color: var(--accent); color: var(--accent2); }

/* ── FOCUS ── */
.focus-wrap { display: flex; flex-wrap: wrap; gap: 8px; }
.fpill {
  font-size: 12.5px; padding: 7px 14px;
  border-radius: 3px; border: 1px solid var(--border2);
  color: var(--soft); background: var(--surface);
  transition: border-color .18s, color .18s; cursor: default;
}
.fpill:hover { border-color: var(--accent); color: var(--text); }

/* ── ACHIEVEMENTS ── */
.ach-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
@media(max-width:540px){ .ach-list { grid-template-columns: 1fr; } }
.ach {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 16px 18px;
  transition: border-color .18s, transform .2s;
}
.ach:hover { border-color: var(--border2); transform: translateY(-2px); }
.ach-ico { font-size: 18px; margin-bottom: 8px; display: block; }
.ach-title { font-size: 13px; font-weight: 600; color: var(--white); margin-bottom: 4px; }
.ach-desc { font-size: 12px; color: var(--muted); line-height: 1.65; }

/* ── FOOTER ── */
.footer {
  margin-top: 72px; padding-top: 24px;
  border-top: 1px solid var(--border);
  display: flex; align-items: center;
  justify-content: space-between; flex-wrap: wrap; gap: 12px;
}
.footer-name { font-family: 'Fraunces', serif; font-size: 15px; font-weight: 700; color: var(--white); }
.footer-sub { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--muted); letter-spacing: .06em; margin-top: 3px; }
.icon-link {
  display: inline-flex; align-items: center; justify-content: center;
  width: 34px; height: 34px; border-radius: 7px;
  border: 1px solid var(--border2); color: var(--muted);
  transition: border-color .18s, color .18s, background .18s; text-decoration: none;
}
.icon-link:hover { border-color: var(--accent); color: var(--accent2); background: rgba(123,111,240,.08); }
.icon-link svg { width: 15px; height: 15px; fill: currentColor; }

::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: rgba(123,111,240,.2); border-radius: 3px; }

.stag-ai{background:rgba(123,111,240,.1);border-color:rgba(123,111,240,.25);color:var(--accent2);}
.stag-ai:hover{border-color:var(--accent);color:var(--white);}


</head>
